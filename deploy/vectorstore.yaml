# VectorStore — the gateway's upstream connection + inbound auth policy.
#
# Declarative equivalent of shelf_common/gateway.py:make_client() — the base
# URL + bearer token the indexer and search backends pass at runtime. In a full
# cluster the gateway reads this CR instead. For kind=search, inbound auth uses
# Layer-issued scoped keys so the hev search data/admin tokens stay upstream-only.
# See docs/kubernetes/vectorstore-crd in ../layer.
apiVersion: hevlayer.com/v1alpha1
kind: VectorStore
metadata:
  name: search-default
  namespace: shelf
spec:
  kind: search
  default: true
  endpoint:
    url: http://hevsearch.shelf.svc.cluster.local:3000
    region: aws-us-east-1
  search:
    adminCredential:
      secretRef:
        name: shelf-hevsearch
        key: admin-api-key
  credential:
    secretRef:
      name: shelf-hevsearch
      key: data-api-key
  inboundAuth:
    mode: keys
    keys:
      - name: shelf-books
        scopes: [read, write]
        secretRef:
          name: shelf-layer-inbound
          key: api-key
