# Template only — DO NOT commit real keys. Create the real Secret out-of-band:
#
#   kubectl -n firn create secret generic firn-keys \
#     --from-literal=api-key="$(openssl rand -hex 32)" \
#     --from-literal=admin-key="$(openssl rand -hex 32)" \
#     --from-literal=metrics-token="$(openssl rand -hex 32)"
#
# api-key    = read/write (upsert, query, list, warmup)
# admin-key  = destructive + index builds (delete, index, fts-index, compact); also authorizes read/write
# metrics-token = gate on /metrics
apiVersion: v1
kind: Secret
metadata:
  name: firn-keys
  namespace: firn
type: Opaque
stringData:
  api-key: REPLACE_ME
  admin-key: REPLACE_ME
  metrics-token: REPLACE_ME
