# Public surface for the demo via the shared hev-public ALB (mirrors chart/shop).
# TLS cert is auto-discovered by host from the wildcard *.hevlayer.com ACM cert on
# the shared ALB (no certificate-arn needed). The Firn engine has NO ingress.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: shelf-firn-demo
  namespace: firn
  annotations:
    alb.ingress.kubernetes.io/group.name: hev-public
    alb.ingress.kubernetes.io/group.order: "50"
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80,"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/healthcheck-path: /healthz
    alb.ingress.kubernetes.io/healthcheck-protocol: HTTP
    alb.ingress.kubernetes.io/tags: hev=public
spec:
  ingressClassName: alb
  rules:
    - host: firn.hevlayer.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: shelf-firn-demo
                port:
                  number: 8000
