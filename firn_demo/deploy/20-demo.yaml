# shelf-on-Firn demo app (FastAPI). Talks to the Firn engine over the in-cluster
# Service; enriches results from the baked metadata sidecar.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shelf-firn-demo
  namespace: firn
  labels: { app: shelf-firn-demo }
spec:
  replicas: 2
  selector:
    matchLabels: { app: shelf-firn-demo }
  template:
    metadata:
      labels: { app: shelf-firn-demo }
    spec:
      nodeSelector:
        layer.hev.dev/node-role: system
      tolerations:
        - key: layer.hev.dev/node-role
          operator: Equal
          value: system
          effect: NoSchedule
      containers:
        - name: web
          image: 186219257916.dkr.ecr.us-east-1.amazonaws.com/shelf-firn-demo:latest
          imagePullPolicy: Always
          ports:
            - { name: http, containerPort: 8000 }
          env:
            - { name: FIRN_URL, value: "http://firn.firn.svc.cluster.local:3000" }
            - { name: FIRN_NAMESPACE, value: "shelf-books" }
            - { name: FIRN_WARM_ON_START, value: "1" }   # eager sidecar load → honest readiness
            - { name: FIRN_API_KEY, valueFrom: { secretKeyRef: { name: firn-keys, key: api-key } } }
          startupProbe:                                    # window for model + sidecar warm
            httpGet: { path: /healthz, port: http }
            periodSeconds: 5
            failureThreshold: 36                           # ~3 min
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests: { cpu: 250m, memory: 1Gi }
            limits: { cpu: "2", memory: 2Gi }
---
apiVersion: v1
kind: Service
metadata:
  name: shelf-firn-demo
  namespace: firn
  labels: { app: shelf-firn-demo }
spec:
  type: ClusterIP
  selector: { app: shelf-firn-demo }
  ports:
    - { name: http, port: 8000, targetPort: http }
